name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            rust-targets: 'x86_64-pc-windows-msvc'
            tauri-args: ''
          # Only Apple Silicon (M-series). x86_64 Intel Macs are a rounding-error
          # install base and doubling the macOS build time for them isn't worth it.
          - platform: 'macos-latest'
            rust-targets: 'aarch64-apple-darwin'
            tauri-args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-latest'
            rust-targets: 'x86_64-unknown-linux-gnu'
            tauri-args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust (stable + targets)
        shell: bash
        run: |
          # Retry rustup to mitigate transient network failures on runners.
          for attempt in 1 2 3; do
            rustup update stable --no-self-update && break
            echo "rustup update attempt $attempt failed, retrying in 10s..." >&2
            sleep 10
          done
          rustup default stable
          for attempt in 1 2 3; do
            rustup target add ${{ matrix.rust-targets }} && break
            echo "target add attempt $attempt failed, retrying in 10s..." >&2
            sleep 10
          done
          rustc --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: ${{ matrix.platform }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      # tauri::generate_context! macro evaluates frontendDist at compile time.
      # Explicitly build the UI before tauri-action so ui/build exists regardless
      # of whether tauri-action picks up beforeBuildCommand.
      - run: pnpm --filter ui build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Stake Dev Tool ${{ github.ref_name }}'
          releaseBody: 'See the [changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.'
          releaseDraft: true
          prerelease: false
          projectPath: .
          args: --config crates/desktop/tauri.conf.json ${{ matrix.tauri-args }}
