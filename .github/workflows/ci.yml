name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SCCACHE_GHA_ENABLED: 'true'
  RUSTC_WRAPPER: 'sccache'
  CARGO_INCREMENTAL: '0'

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust (stable + clippy + rustfmt)
        shell: bash
        run: |
          # Retry rustup to mitigate transient network failures on runners.
          for attempt in 1 2 3; do
            rustup update stable --no-self-update && break
            echo "rustup update attempt $attempt failed, retrying in 10s..." >&2
            sleep 10
          done
          rustup default stable
          rustup component add clippy rustfmt
          rustc --version

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - uses: Swatinem/rust-cache@v2

      # tauri::generate_context! evaluates frontendDist at compile time, so
      # ui/build must exist before any cargo command in the desktop crate.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter ui build

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo check --workspace

  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false
      - run: pnpm --filter ui check
      - run: pnpm --filter ui build
