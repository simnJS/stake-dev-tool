<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stake Dev Tool — Preview</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #f5f5f5;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.6rem 1rem;
        background: #111;
        border-bottom: 1px solid #222;
        font-size: 0.85rem;
      }
      .topbar .brand {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 600;
      }
      .topbar .badge {
        background: #1f1f1f;
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        padding: 0.1rem 0.5rem;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 0.75rem;
        color: #aaa;
      }
      .topbar a {
        color: #aaa;
        text-decoration: none;
      }
      .topbar a:hover {
        color: #fff;
      }
      .stage {
        position: fixed;
        inset: 38px 0 0 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }
      iframe.game {
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }
      .splash {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.7rem;
        background: #0a0a0a;
        transition: opacity 0.4s ease;
      }
      .splash.gone {
        opacity: 0;
        pointer-events: none;
      }
      .splash .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid #2a2a2a;
        border-top-color: #fff;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .splash .step {
        color: #888;
        font-size: 0.85rem;
        font-family: ui-monospace, SFMono-Regular, monospace;
      }
      .splash .err {
        color: #ff6b6b;
        max-width: 600px;
        padding: 1rem;
        background: #1a0e0e;
        border: 1px solid #3a1a1a;
        border-radius: 6px;
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 0.78rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="brand">
        <span>🎰 Stake Dev Tool</span>
        <span class="badge" id="badge-game">…</span>
        <span class="badge" style="color: #ff9a3a">PREVIEW</span>
      </div>
      <a href="https://github.com/simnJS/stake-dev-tool" target="_blank" rel="noopener">
        Built with stake-dev-tool ↗
      </a>
    </div>
    <div class="stage">
      <iframe class="game" id="game-frame" sandbox="allow-scripts allow-same-origin"></iframe>
      <div class="splash" id="splash">
        <div class="spinner"></div>
        <div class="step" id="splash-step">Booting WASM engine…</div>
      </div>
    </div>
    <script type="module" src="./runtime.js"></script>
  </body>
</html>
